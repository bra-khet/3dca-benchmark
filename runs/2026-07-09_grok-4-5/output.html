<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3D Metaball Cellular Growth — Raymarched CA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; color: #c8d0e0; font: 12px/1.4 "Segoe UI", system-ui, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
  canvas:active { cursor: grabbing; }
  #ui {
    position: fixed; top: 12px; right: 12px; width: 270px; max-height: calc(100vh - 24px);
    overflow-y: auto; padding: 12px 14px 14px;
    background: rgba(10, 14, 24, 0.88); border: 1px solid rgba(120, 160, 255, 0.18);
    border-radius: 10px; backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  }
  #ui h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: #9ec8ff; margin-bottom: 4px; }
  #ui .sub { color: #6a7a96; font-size: 10px; margin-bottom: 10px; }
  #stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px;
    margin-bottom: 10px; padding: 8px; border-radius: 6px;
    background: rgba(40, 80, 160, 0.12); color: #a8c4e8; font-variant-numeric: tabular-nums;
  }
  #stats span { color: #e0ecff; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .row label { flex: 1; color: #8a9ab0; min-width: 0; }
  .row input[type=range] { width: 110px; accent-color: #5ab0ff; }
  .row .val { width: 36px; text-align: right; color: #b8c8e0; font-variant-numeric: tabular-nums; }
  .btns { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 4px; }
  button {
    flex: 1; min-width: 56px; padding: 6px 8px; border: 1px solid rgba(100,140,220,0.35);
    border-radius: 6px; background: rgba(40,70,130,0.45); color: #d0e0ff;
    cursor: pointer; font: inherit; transition: background 0.15s;
  }
  button:hover { background: rgba(60,100,180,0.55); }
  button.active { background: rgba(80,140,220,0.55); border-color: #7ab8ff; }
  .section { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(100,130,180,0.15); }
  .section-title { color: #6a90c0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  #hint { position: fixed; left: 12px; bottom: 12px; color: rgba(160,180,210,0.55); font-size: 11px; pointer-events: none; }
</style>
</head>
<body>
<!--
  3D Raymarched Metaball Cellular Growth System
  ==============================================
  HOW THE RULES WORK:
    Each blob has position, radius, energy, age.
    Each sim step, count neighbors within neighborRadius:
      - Isolated (neighbors < lowThresh) or low energy → lose energy, shrink; die if energy < deathFloor.
      - Crowded enough (neighbors >= growThresh) + enough energy → gain energy; chance to spawn a child nearby.
      - Nearby blobs exchange a little energy (diffusion / soft merge influence).
    Radius tracks energy; smooth interpolation hides discrete sim steps.

  TUNABLE PARAMETERS (also in UI):
    neighborRadius, growThresh, lowThresh, growthRate, deathRate,
    spawnChance, maxBlobs, spawnEnergy, deathFloor, energyShare,
    simSpeed, smoothK (metaball blend), camera auto-orbit speed.

  CONTROLS: drag to orbit, scroll to zoom, sliders for rules, Pause/Step/Reset.
-->
<canvas id="c"></canvas>
<div id="ui">
  <h1>Metaball Cellular Growth</h1>
  <div class="sub">3D raymarched CA · drag to orbit · scroll zoom</div>
  <div id="stats">
    <div>Alive: <span id="sAlive">0</span></div>
    <div>Gen: <span id="sGen">0</span></div>
    <div>FPS: <span id="sFps">0</span></div>
    <div>Avg E: <span id="sEnergy">0</span></div>
  </div>
  <div class="btns">
    <button id="btnPause" type="button">Pause</button>
    <button id="btnStep" type="button">Step</button>
    <button id="btnReset" type="button">Reset</button>
  </div>
  <div class="section">
    <div class="section-title">Simulation</div>
    <div class="row"><label>Neighbor R</label><input type="range" id="neighborRadius" min="0.4" max="2.5" step="0.05" value="1.15" /><span class="val" id="v-neighborRadius">1.15</span></div>
    <div class="row"><label>Grow thresh</label><input type="range" id="growThresh" min="1" max="8" step="1" value="2" /><span class="val" id="v-growThresh">2</span></div>
    <div class="row"><label>Low thresh</label><input type="range" id="lowThresh" min="0" max="4" step="1" value="1" /><span class="val" id="v-lowThresh">1</span></div>
    <div class="row"><label>Growth rate</label><input type="range" id="growthRate" min="0.01" max="0.4" step="0.01" value="0.12" /><span class="val" id="v-growthRate">0.12</span></div>
    <div class="row"><label>Death rate</label><input type="range" id="deathRate" min="0.01" max="0.35" step="0.01" value="0.08" /><span class="val" id="v-deathRate">0.08</span></div>
    <div class="row"><label>Spawn chance</label><input type="range" id="spawnChance" min="0" max="0.35" step="0.01" value="0.08" /><span class="val" id="v-spawnChance">0.08</span></div>
    <div class="row"><label>Max blobs</label><input type="range" id="maxBlobs" min="20" max="80" step="1" value="64" /><span class="val" id="v-maxBlobs">64</span></div>
    <div class="row"><label>Energy share</label><input type="range" id="energyShare" min="0" max="0.2" step="0.005" value="0.04" /><span class="val" id="v-energyShare">0.04</span></div>
    <div class="row"><label>Sim speed</label><input type="range" id="simSpeed" min="0.2" max="4" step="0.1" value="1.0" /><span class="val" id="v-simSpeed">1.0</span></div>
  </div>
  <div class="section">
    <div class="section-title">Look</div>
    <div class="row"><label>Smooth K</label><input type="range" id="smoothK" min="0.05" max="0.55" step="0.01" value="0.28" /><span class="val" id="v-smoothK">0.28</span></div>
    <div class="row"><label>Auto orbit</label><input type="range" id="autoOrbit" min="0" max="0.6" step="0.02" value="0.18" /><span class="val" id="v-autoOrbit">0.18</span></div>
    <div class="row"><label>Trails</label><input type="range" id="trailStrength" min="0" max="0.92" step="0.02" value="0.55" /><span class="val" id="v-trailStrength">0.55</span></div>
  </div>
</div>
<div id="hint">LMB drag · wheel zoom · rules on the right</div>

<script>
// =============================================================================
// CONFIG & PALETTE (easy to tweak)
// =============================================================================
const MAX_BLOBS = 80; // hard cap for GPU uniform packing
const SEED_COUNT = 48;

// Organic palette anchors (linear RGB-ish, shader remaps by energy/age)
const PALETTE = {
  baseDeep:  [0.08, 0.05, 0.18],
  midPurple: [0.35, 0.12, 0.55],
  glowCyan:  [0.15, 0.85, 0.95],
  glowMag:   [0.95, 0.25, 0.70],
  glowYel:   [0.95, 0.85, 0.30],
};

const params = {
  neighborRadius: 1.15,
  growThresh: 2,
  lowThresh: 1,
  growthRate: 0.12,
  deathRate: 0.08,
  spawnChance: 0.08,
  maxBlobs: 64,
  energyShare: 0.04,
  simSpeed: 1.0,
  smoothK: 0.28,
  autoOrbit: 0.18,
  trailStrength: 0.55,
  spawnEnergy: 0.55,
  deathFloor: 0.12,
  minRadius: 0.12,
  maxRadius: 0.55,
  worldBound: 2.6,
};

// =============================================================================
// SIMULATION — blobs + cellular rules (JS only)
// =============================================================================
/** @typedef {{x:number,y:number,z:number, r:number, energy:number, age:number,
 *             px:number,py:number,pz:number, pr:number, pe:number}} Blob */

/** @type {Blob[]} */
let blobs = [];
let generation = 0;
let simAccumulator = 0;
const SIM_DT = 1 / 30; // fixed sim step for stable rules
let paused = false;
let stepOnce = false;

function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function len3(x, y, z) { return Math.sqrt(x * x + y * y + z * z); }

function createBlob(x, y, z, energy, age) {
  const e = energy ?? rand(0.4, 0.9);
  const r = radiusFromEnergy(e);
  return {
    x, y, z, r, energy: e, age: age ?? 0,
    // previous frame for smooth interpolation
    px: x, py: y, pz: z, pr: r, pe: e,
  };
}

function radiusFromEnergy(e) {
  return params.minRadius + (params.maxRadius - params.minRadius) * clamp(e, 0, 1.4) / 1.4;
}

function seedBlobs() {
  blobs = [];
  const n = Math.min(SEED_COUNT, params.maxBlobs, MAX_BLOBS);
  // Seed a few clusters so growth is interesting from frame 0
  const centers = [
    [0, 0, 0],
    [1.1, 0.3, -0.4],
    [-0.9, -0.2, 0.7],
    [0.2, 0.9, 0.5],
  ];
  for (let i = 0; i < n; i++) {
    const c = centers[i % centers.length];
    const j = Math.floor(i / centers.length);
    const ang = j * 2.1 + i * 0.7;
    const rad = 0.15 + (j % 5) * 0.12 + rand(0, 0.08);
    blobs.push(createBlob(
      c[0] + Math.cos(ang) * rad + rand(-0.05, 0.05),
      c[1] + Math.sin(ang * 1.3) * rad * 0.8 + rand(-0.05, 0.05),
      c[2] + Math.sin(ang) * rad + rand(-0.05, 0.05),
      rand(0.45, 1.0),
      rand(0, 20)
    ));
  }
  generation = 0;
}

/**
 * Cellular growth step:
 * 1) Neighbor count within neighborRadius (O(n²) — fine for n ≤ 80)
 * 2) Local rules: grow / spawn / die
 * 3) Soft energy diffusion between nearby blobs
 */
function simStep() {
  const n = blobs.length;
  if (n === 0) {
    // Soft reseed if everything died
    seedBlobs();
    return;
  }

  // Snapshot previous for GPU interpolation
  for (let i = 0; i < n; i++) {
    const b = blobs[i];
    b.px = b.x; b.py = b.y; b.pz = b.z; b.pr = b.r; b.pe = b.energy;
  }

  const R = params.neighborRadius;
  const R2 = R * R;
  const counts = new Int16Array(n);
  // Accumulate energy transfer targets
  const dE = new Float32Array(n);

  // Neighbor counts + weak energy sharing
  for (let i = 0; i < n; i++) {
    const a = blobs[i];
    for (let j = i + 1; j < n; j++) {
      const b = blobs[j];
      const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
      const d2 = dx * dx + dy * dy + dz * dz;
      if (d2 < R2) {
        counts[i]++; counts[j]++;
        // Soft merge influence: energy bleeds toward average when close
        if (params.energyShare > 0 && d2 > 1e-6) {
          const d = Math.sqrt(d2);
          const w = params.energyShare * (1 - d / R);
          const mid = (a.energy + b.energy) * 0.5;
          dE[i] += (mid - a.energy) * w;
          dE[j] += (mid - b.energy) * w;
        }
      }
    }
  }

  const spawn = [];
  const maxB = Math.min(params.maxBlobs, MAX_BLOBS);

  for (let i = 0; i < n; i++) {
    const b = blobs[i];
    const c = counts[i];
    b.energy += dE[i];
    b.age += 1;

    // RULE: growth when enough neighbors + energy
    if (c >= params.growThresh && b.energy > 0.35) {
      b.energy += params.growthRate * (0.6 + 0.4 * Math.random());
      // Chance to spawn a child nearby
      if (blobs.length + spawn.length < maxB &&
          Math.random() < params.spawnChance * (0.5 + 0.5 * b.energy)) {
        const ang = Math.random() * Math.PI * 2;
        const elev = (Math.random() - 0.5) * Math.PI;
        const dist = b.r * 1.6 + rand(0.15, 0.45);
        const sx = b.x + Math.cos(ang) * Math.cos(elev) * dist;
        const sy = b.y + Math.sin(elev) * dist;
        const sz = b.z + Math.sin(ang) * Math.cos(elev) * dist;
        // Parent spends some energy
        b.energy *= 0.82;
        spawn.push(createBlob(
          clamp(sx, -params.worldBound, params.worldBound),
          clamp(sy, -params.worldBound, params.worldBound),
          clamp(sz, -params.worldBound, params.worldBound),
          params.spawnEnergy * rand(0.75, 1.15),
          0
        ));
      }
    }
    // RULE: isolation or low energy → decay
    else if (c <= params.lowThresh || b.energy < 0.3) {
      b.energy -= params.deathRate * (c === 0 ? 1.25 : 1.0);
    } else {
      // Comfortable mid-density: gentle homeostasis
      b.energy += (0.55 - b.energy) * 0.02;
    }

    // Mild drift / separation to avoid total overlap
    let fx = 0, fy = 0, fz = 0;
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const o = blobs[j];
      const dx = b.x - o.x, dy = b.y - o.y, dz = b.z - o.z;
      const d2 = dx * dx + dy * dy + dz * dz;
      const minD = (b.r + o.r) * 0.85;
      if (d2 < minD * minD && d2 > 1e-8) {
        const d = Math.sqrt(d2);
        const push = (minD - d) * 0.08;
        fx += (dx / d) * push;
        fy += (dy / d) * push;
        fz += (dz / d) * push;
      }
    }
    // Slow wander + soft pull toward origin (keeps cluster in view)
    fx += (Math.random() - 0.5) * 0.012 - b.x * 0.008;
    fy += (Math.random() - 0.5) * 0.012 - b.y * 0.008;
    fz += (Math.random() - 0.5) * 0.012 - b.z * 0.008;
    b.x = clamp(b.x + fx, -params.worldBound, params.worldBound);
    b.y = clamp(b.y + fy, -params.worldBound, params.worldBound);
    b.z = clamp(b.z + fz, -params.worldBound, params.worldBound);

    b.energy = clamp(b.energy, 0, 1.5);
    b.r = radiusFromEnergy(b.energy);
  }

  // Remove dead (below energy threshold)
  blobs = blobs.filter(b => b.energy >= params.deathFloor);
  // Add spawns
  for (let i = 0; i < spawn.length && blobs.length < maxB; i++) {
    blobs.push(spawn[i]);
  }

  // Cap if over (cull lowest energy)
  if (blobs.length > maxB) {
    blobs.sort((a, b) => b.energy - a.energy);
    blobs.length = maxB;
  }

  generation++;
}

// =============================================================================
// RENDERING — WebGL2 raymarcher
// =============================================================================
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, preserveDrawingBuffer: true });
if (!gl) {
  document.body.innerHTML = '<p style="color:#fff;padding:2rem">WebGL2 required.</p>';
  throw new Error('WebGL2 not available');
}

const VS = `#version 300 es
precision highp float;
const vec2 V[3] = vec2[3](vec2(-1,-1), vec2(3,-1), vec2(-1,3));
out vec2 vUv;
void main() {
  vec2 p = V[gl_VertexID];
  vUv = p * 0.5 + 0.5;
  gl_Position = vec4(p, 0.0, 1.0);
}`;

const FS = `#version 300 es
precision highp float;

in vec2 vUv;
out vec4 fragColor;

uniform vec2  uRes;
uniform float uTime;
uniform float uSmoothK;
uniform float uBlobCount;
uniform vec4  uBlobs[80];   // xyz = pos, w = radius
uniform vec4  uBlobMeta[80]; // x = energy, y = age (normalized-ish)
uniform vec3  uCamPos;
uniform vec3  uCamTarget;
uniform float uTrail;       // 0..1 trail/history mix (applied in JS via previous frame — here: fake temporal glow)
uniform vec3  uPalDeep;
uniform vec3  uPalPurple;
uniform vec3  uPalCyan;
uniform vec3  uPalMag;
uniform vec3  uPalYel;

// --- cheap hash / noise for surface detail ---
float hash(vec3 p) {
  p = fract(p * 0.3183099 + vec3(0.1, 0.2, 0.3));
  p *= 17.0;
  return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}
float noise(vec3 p) {
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
        mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
    mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
        mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y),
    f.z);
}

// Polynomial smooth minimum (Inigo Quilez) — soft metaball union
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

// Scene SDF: smooth union of all blob spheres + subtle displacement
float map(vec3 p, out float outEnergy, out float outAge) {
  float d = 1e5;
  float eAcc = 0.0;
  float aAcc = 0.0;
  float wAcc = 0.0;
  int n = int(uBlobCount + 0.5);
  for (int i = 0; i < 80; i++) {
    if (i >= n) break;
    vec3 c = uBlobs[i].xyz;
    float r = uBlobs[i].w;
    float di = length(p - c) - r;
    // Weight contribution for energy/age field near surface
    float w = exp(-max(di, 0.0) * 4.0) * (0.35 + uBlobMeta[i].x);
    eAcc += uBlobMeta[i].x * w;
    aAcc += uBlobMeta[i].y * w;
    wAcc += w;
    d = smin(d, di, uSmoothK);
  }
  // Time-based organic surface ripple
  float nse = noise(p * 2.4 + uTime * 0.35) * 0.035
            + noise(p * 5.0 - uTime * 0.2) * 0.012;
  d += nse;
  outEnergy = wAcc > 1e-4 ? eAcc / wAcc : 0.0;
  outAge = wAcc > 1e-4 ? aAcc / wAcc : 0.0;
  return d;
}

float mapSimple(vec3 p) {
  float e, a;
  return map(p, e, a);
}

vec3 calcNormal(vec3 p) {
  const float e = 0.0015;
  return normalize(vec3(
    mapSimple(p + vec3(e,0,0)) - mapSimple(p - vec3(e,0,0)),
    mapSimple(p + vec3(0,e,0)) - mapSimple(p - vec3(0,e,0)),
    mapSimple(p + vec3(0,0,e)) - mapSimple(p - vec3(0,0,e))
  ));
}

// Soft shadow / AO via few cone steps
float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
  float res = 1.0;
  float t = mint;
  for (int i = 0; i < 16; i++) {
    float h = mapSimple(ro + rd * t);
    if (h < 0.001) return 0.15;
    res = min(res, k * h / t);
    t += clamp(h, 0.02, 0.25);
    if (t > maxt) break;
  }
  return clamp(res, 0.15, 1.0);
}

float ambientOcc(vec3 p, vec3 n) {
  float occ = 0.0;
  float sc = 1.0;
  for (int i = 0; i < 5; i++) {
    float h = 0.02 + 0.12 * float(i);
    float d = mapSimple(p + n * h);
    occ += (h - d) * sc;
    sc *= 0.75;
  }
  return clamp(1.0 - 1.6 * occ, 0.0, 1.0);
}

vec3 palette(float energy, float age) {
  // Deep base → purple mid → energy drives cyan/magenta/yellow glow
  float t = clamp(energy, 0.0, 1.4) / 1.4;
  float pulse = 0.5 + 0.5 * sin(uTime * 2.2 + age * 6.0);
  vec3 col = mix(uPalDeep, uPalPurple, smoothstep(0.0, 0.45, t));
  col = mix(col, uPalCyan, smoothstep(0.25, 0.75, t) * 0.85);
  col = mix(col, uPalMag, smoothstep(0.55, 1.0, t) * (0.4 + 0.6 * pulse));
  col = mix(col, uPalYel, smoothstep(0.85, 1.3, energy) * 0.55);
  return col;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;

  // Camera basis
  vec3 ro = uCamPos;
  vec3 ta = uCamTarget;
  vec3 ww = normalize(ta - ro);
  vec3 uu = normalize(cross(ww, vec3(0.0, 1.0, 0.0)));
  vec3 vv = cross(uu, ww);
  vec3 rd = normalize(uu * uv.x + vv * uv.y + ww * 1.65);

  // Raymarch
  float t = 0.0;
  float hit = 0.0;
  float energy = 0.0;
  float age = 0.0;
  vec3 p = ro;
  for (int i = 0; i < 90; i++) {
    p = ro + rd * t;
    float d = map(p, energy, age);
    if (d < 0.0015) { hit = 1.0; break; }
    if (t > 18.0) break;
    t += d * 0.85;
  }

  // Background: deep space gradient + faint nebula
  float v = length(uv);
  vec3 bg = mix(vec3(0.02, 0.03, 0.07), vec3(0.06, 0.03, 0.12), v);
  bg += vec3(0.02, 0.04, 0.08) * noise(vec3(uv * 3.0, uTime * 0.05));
  // Soft volumetric glow from blob field (cheap: sample along ray)
  float glow = 0.0;
  {
    float gt = 0.5;
    for (int i = 0; i < 10; i++) {
      vec3 gp = ro + rd * gt;
      float ge, ga;
      float gd = map(gp, ge, ga);
      glow += exp(-max(gd, 0.0) * 3.5) * (0.3 + ge) * 0.08;
      gt += 0.45;
    }
  }
  bg += glow * mix(uPalCyan, uPalMag, 0.4 + 0.3 * sin(uTime));

  vec3 col = bg;

  if (hit > 0.5) {
    p = ro + rd * t;
    float e, a;
    map(p, e, a);
    vec3 n = calcNormal(p);
    vec3 lightDir = normalize(vec3(0.55, 0.75, 0.35));
    vec3 viewDir = normalize(ro - p);

    // Key + fill + rim
    float diff = max(dot(n, lightDir), 0.0);
    float fill = 0.18 + 0.22 * max(dot(n, normalize(vec3(-0.4, 0.2, -0.5))), 0.0);
    float rim = pow(1.0 - max(dot(n, viewDir), 0.0), 3.0);
    float spec = pow(max(dot(reflect(-lightDir, n), viewDir), 0.0), 32.0);

    float sh = softShadow(p + n * 0.02, lightDir, 0.02, 6.0, 8.0);
    float ao = ambientOcc(p, n);

    vec3 albedo = palette(e, a);
    // Emissive scaled by energy (brighter / more saturated when active)
    vec3 emissive = albedo * (0.15 + 1.4 * e * e) * (0.75 + 0.25 * sin(uTime * 3.0 + a * 8.0));
    emissive = mix(emissive, uPalYel, smoothstep(1.0, 1.4, e) * 0.35);

    col = albedo * (diff * sh * 0.85 + fill) * ao;
    col += vec3(1.0, 0.95, 0.9) * spec * sh * 0.35;
    col += emissive * (0.55 + rim * 0.65);
    col += rim * mix(uPalCyan, uPalMag, e) * 0.35;

    // Cheap distance fog into nebula
    float fog = 1.0 - exp(-t * 0.04);
    col = mix(col, bg, fog * 0.35);
  }

  // Post: mild glow boost + vignette
  col += glow * 0.35 * uTrail;
  col = col / (1.0 + col * 0.35); // soft tonemap
  col = pow(col, vec3(0.92));     // slight contrast lift
  float vig = smoothstep(1.35, 0.25, v);
  col *= mix(0.55, 1.0, vig);

  fragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('Shader compile failed');
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('Program link failed');
}
gl.useProgram(prog);
// Fullscreen triangle — no VBO needed (gl_VertexID)
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

const U = {
  res: gl.getUniformLocation(prog, 'uRes'),
  time: gl.getUniformLocation(prog, 'uTime'),
  smoothK: gl.getUniformLocation(prog, 'uSmoothK'),
  blobCount: gl.getUniformLocation(prog, 'uBlobCount'),
  camPos: gl.getUniformLocation(prog, 'uCamPos'),
  camTarget: gl.getUniformLocation(prog, 'uCamTarget'),
  trail: gl.getUniformLocation(prog, 'uTrail'),
  palDeep: gl.getUniformLocation(prog, 'uPalDeep'),
  palPurple: gl.getUniformLocation(prog, 'uPalPurple'),
  palCyan: gl.getUniformLocation(prog, 'uPalCyan'),
  palMag: gl.getUniformLocation(prog, 'uPalMag'),
  palYel: gl.getUniformLocation(prog, 'uPalYel'),
};
// Array uniforms
const uBlobs = [];
const uBlobMeta = [];
for (let i = 0; i < MAX_BLOBS; i++) {
  uBlobs.push(gl.getUniformLocation(prog, `uBlobs[${i}]`));
  uBlobMeta.push(gl.getUniformLocation(prog, `uBlobMeta[${i}]`));
}

gl.uniform3fv(U.palDeep, PALETTE.baseDeep);
gl.uniform3fv(U.palPurple, PALETTE.midPurple);
gl.uniform3fv(U.palCyan, PALETTE.glowCyan);
gl.uniform3fv(U.palMag, PALETTE.glowMag);
gl.uniform3fv(U.palYel, PALETTE.glowYel);

// =============================================================================
// CAMERA
// =============================================================================
const cam = {
  theta: 0.6,
  phi: 0.45,
  dist: 6.2,
  target: [0, 0, 0],
  dragging: false,
  lastX: 0,
  lastY: 0,
};

function camPos() {
  const cp = Math.cos(cam.phi), sp = Math.sin(cam.phi);
  const ct = Math.cos(cam.theta), st = Math.sin(cam.theta);
  return [
    cam.target[0] + cam.dist * cp * ct,
    cam.target[1] + cam.dist * sp,
    cam.target[2] + cam.dist * cp * st,
  ];
}

canvas.addEventListener('pointerdown', (e) => {
  cam.dragging = true;
  cam.lastX = e.clientX;
  cam.lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointerup', () => { cam.dragging = false; });
canvas.addEventListener('pointercancel', () => { cam.dragging = false; });
canvas.addEventListener('pointermove', (e) => {
  if (!cam.dragging) return;
  const dx = e.clientX - cam.lastX;
  const dy = e.clientY - cam.lastY;
  cam.lastX = e.clientX;
  cam.lastY = e.clientY;
  cam.theta += dx * 0.007;
  cam.phi = clamp(cam.phi + dy * 0.007, -1.35, 1.35);
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  cam.dist = clamp(cam.dist * (1 + e.deltaY * 0.001), 2.5, 14);
}, { passive: false });

// =============================================================================
// UI BINDINGS
// =============================================================================
function bindSlider(id, key, isInt) {
  const el = document.getElementById(id);
  const lab = document.getElementById('v-' + id);
  const sync = () => {
    const v = isInt ? parseInt(el.value, 10) : parseFloat(el.value);
    params[key] = v;
    lab.textContent = isInt ? String(v) : (Number.isInteger(v) ? v.toFixed(0) : v.toFixed(2));
  };
  el.addEventListener('input', sync);
  sync();
}
bindSlider('neighborRadius', 'neighborRadius');
bindSlider('growThresh', 'growThresh', true);
bindSlider('lowThresh', 'lowThresh', true);
bindSlider('growthRate', 'growthRate');
bindSlider('deathRate', 'deathRate');
bindSlider('spawnChance', 'spawnChance');
bindSlider('maxBlobs', 'maxBlobs', true);
bindSlider('energyShare', 'energyShare');
bindSlider('simSpeed', 'simSpeed');
bindSlider('smoothK', 'smoothK');
bindSlider('autoOrbit', 'autoOrbit');
bindSlider('trailStrength', 'trailStrength');

const btnPause = document.getElementById('btnPause');
const btnStep = document.getElementById('btnStep');
const btnReset = document.getElementById('btnReset');
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? 'Resume' : 'Pause';
  btnPause.classList.toggle('active', paused);
});
btnStep.addEventListener('click', () => {
  if (!paused) {
    paused = true;
    btnPause.textContent = 'Resume';
    btnPause.classList.add('active');
  }
  stepOnce = true;
});
btnReset.addEventListener('click', () => {
  seedBlobs();
  generation = 0;
});

// =============================================================================
// RESIZE + MAIN LOOP
// =============================================================================
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    gl.viewport(0, 0, w, h);
  }
}
window.addEventListener('resize', resize);
resize();

// Packed GPU buffers (reused)
const packPos = new Float32Array(MAX_BLOBS * 4);
const packMeta = new Float32Array(MAX_BLOBS * 4);

let lastT = performance.now();
let fpsSmooth = 60;
let timeSec = 0;
let alpha = 1; // sim interpolation 0..1

function frame(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  fpsSmooth = fpsSmooth * 0.9 + (1 / Math.max(dt, 1e-4)) * 0.1;
  timeSec += dt;
  resize();

  // Auto-orbit (paused while dragging)
  if (!cam.dragging && params.autoOrbit > 0) {
    cam.theta += params.autoOrbit * dt * 0.35;
  }

  // Simulation clock
  if (!paused || stepOnce) {
    const speed = stepOnce ? 1 : params.simSpeed;
    if (stepOnce) {
      simStep();
      stepOnce = false;
      alpha = 1;
      simAccumulator = 0;
    } else {
      simAccumulator += dt * speed;
      while (simAccumulator >= SIM_DT) {
        simStep();
        simAccumulator -= SIM_DT;
      }
      alpha = simAccumulator / SIM_DT;
    }
  }

  // Pack interpolated blobs for GPU
  const n = Math.min(blobs.length, MAX_BLOBS);
  for (let i = 0; i < n; i++) {
    const b = blobs[i];
    const x = b.px + (b.x - b.px) * alpha;
    const y = b.py + (b.y - b.py) * alpha;
    const z = b.pz + (b.z - b.pz) * alpha;
    const r = b.pr + (b.r - b.pr) * alpha;
    const e = b.pe + (b.energy - b.pe) * alpha;
    packPos[i * 4] = x;
    packPos[i * 4 + 1] = y;
    packPos[i * 4 + 2] = z;
    packPos[i * 4 + 3] = r;
    packMeta[i * 4] = e;
    packMeta[i * 4 + 1] = (b.age % 200) / 200;
    packMeta[i * 4 + 2] = 0;
    packMeta[i * 4 + 3] = 0;
  }

  gl.useProgram(prog);
  gl.bindVertexArray(vao);
  gl.uniform2f(U.res, canvas.width, canvas.height);
  gl.uniform1f(U.time, timeSec);
  gl.uniform1f(U.smoothK, params.smoothK);
  gl.uniform1f(U.blobCount, n);
  gl.uniform1f(U.trail, params.trailStrength);
  const cp = camPos();
  gl.uniform3f(U.camPos, cp[0], cp[1], cp[2]);
  gl.uniform3f(U.camTarget, cam.target[0], cam.target[1], cam.target[2]);

  for (let i = 0; i < n; i++) {
    gl.uniform4f(uBlobs[i], packPos[i * 4], packPos[i * 4 + 1], packPos[i * 4 + 2], packPos[i * 4 + 3]);
    gl.uniform4f(uBlobMeta[i], packMeta[i * 4], packMeta[i * 4 + 1], 0, 0);
  }

  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // HUD
  let eSum = 0;
  for (let i = 0; i < blobs.length; i++) eSum += blobs[i].energy;
  document.getElementById('sAlive').textContent = String(blobs.length);
  document.getElementById('sGen').textContent = String(generation);
  document.getElementById('sFps').textContent = String(Math.round(fpsSmooth));
  document.getElementById('sEnergy').textContent = blobs.length ? (eSum / blobs.length).toFixed(2) : '0';

  requestAnimationFrame(frame);
}

seedBlobs();
requestAnimationFrame(frame);
</script>
</body>
</html>
